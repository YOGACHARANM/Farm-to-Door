spring.application.name=Project01

# Server port — Railway injects PORT env var automatically
server.port=${PORT:8080}

# Database — Railway injects MYSQL_URL, MYSQLUSER, MYSQLPASSWORD
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/fooddb}
spring.datasource.username=${MYSQLUSER:${DB_USERNAME:root}}
spring.datasource.password=${MYSQLPASSWORD:${DB_PASSWORD:Pani@284}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
