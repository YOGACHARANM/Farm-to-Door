spring.application.name=Project01

# Server port — Railway injects PORT automatically
server.port=${PORT:8080}

# ── Database connection ────────────────────────────────────────────────────────
# Railway MySQL plugin auto-shares: MYSQLHOST, MYSQLPORT, MYSQLDATABASE,
# MYSQLUSER, MYSQLPASSWORD into every service in the same project.
# Fallback values are for local development.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:fooddb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&autoReconnect=true&connectTimeout=30000&socketTimeout=60000
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:Pani@284}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP connection pool ───────────────────────────────────────────────────
# Wait up to 60 s for an initial connection (e.g. while MySQL is still starting)
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=120000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.connection.characterEncoding=utf8
spring.jpa.properties.hibernate.connection.useUnicode=true
# Defer datasource init so Tomcat starts before Hibernate connects
spring.jpa.defer-datasource-initialization=true
