<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Farm-to-Door</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: block;
            /* Override split screen flex */
            height: auto;
            background: var(--bg-light);
        }

        /* Hero Section for Auth */
        .auth-hero {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('image/header-bg.png');
            background-size: cover;
            background-position: center;
            min-height: 80vh;
            /* Takes up most of the screen */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .auth-box {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .auth-box h2 {
            margin-bottom: 2rem;
            color: var(--primary-color);
        }
    </style>
</head>

<body>
    <!-- Navbar (Same as Home) -->
    <nav class="navbar">
        <div class="logo"><a href="main.html">Farm-to-Door 🌿</a></div>
        <div class="nav-links">
            <a href="main.html">Home</a>
            <a href="wholesale.html">Wholesale</a>
            <a href="plan.html">Subscription</a>
            <a href="#about">About</a>
        </div>
    </nav>

    <!-- Full Width Hero with Centered Form -->
    <div class="auth-hero">
        <div class="auth-box">
            <h2>Create Account</h2>
            <form id="signup-form">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Create a password">
                </div>
                <button type="submit" class="btn" style="width: 100%;">Sign Up</button>
            </form>
            <p style="margin-top: 1.5rem;">Already have an account? <a href="login.html"
                    style="color: var(--accent-color); font-weight: 600;">Login</a></p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Farm-to-Door Platform. All rights reserved.</p>
    </footer>

    <script src="js/config.js"></script>
    <script>
        document.getElementById("signup-form").addEventListener("submit", async function (e) {
            e.preventDefault();
            const fullName = document.getElementById("fullName").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const res = await fetch(`${API_BASE_URL}/api/auth/signup`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ fullName, email, password })
                });

                const result = await res.text();
                if (result === "Signup successful") {
                    alert("Account created! Redirecting to login...");
                    window.location.href = "login.html";
                } else {
                    alert(result);
                }
            } catch (err) {
                console.error(err);
                alert("Connection failed. Ensure backend is running.");
            }
        });
    </script>
</body>

</html>
